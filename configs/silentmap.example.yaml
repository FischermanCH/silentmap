# silentmap example configuration
# All settings are optional — defaults are used when not set.
# Copy to your data directory as silentmap.yaml and adjust as needed.

# Network interface to listen on (empty = auto-detect)
interface: ""

# Web UI
web:
  listen: "0.0.0.0:8080"
  auth:
    enabled: false
    username: "admin"
    password: ""

# Collector modules
collectors:
  arp:
    enabled: true
    offline_timeout: 15m   # time after last packet until device is marked offline

  mdns:
    enabled: true          # hostname and service discovery via mDNS

  dhcp:
    enabled: true          # hostname discovery via DHCP snooping

  ping:
    enabled: true
    targets: "priority"    # "priority" = only ping priority devices
    interval: 5m           # how often to ping (default: 5 minutes)
    timeout: 3s

  nmap:
    enabled: false
    args: "-sV --top-ports 20 -T3"

# Log / event retention
storage:
  log_retention_days: 30   # delete events and alerts older than N days

# Alerting
alerts:
  rules:
    new_device:
      enabled: true
      severity: "high"

    priority_offline:
      enabled: true
      severity: "critical"
      threshold: 10m
      cooldown: 30m

    device_back:
      enabled: true
      severity: "info"

  channels:
    ntfy:
      enabled: false
      url: "https://ntfy.sh/your-topic"
      token: ""              # optional Bearer token for protected topics

    discord:
      enabled: false
      webhook_url: ""        # Discord webhook URL

    webhook:
      enabled: false
      url: ""
      method: "POST"
      headers: {}

    email:
      enabled: false
      smtp_host: ""
      smtp_port: 587
      smtp_user: ""
      smtp_pass: ""
      from: ""
      to: []

  routing:
    critical: ["ntfy", "discord", "email"]
    high:     ["ntfy", "discord"]
    medium:   ["webhook"]
    info:     []
    low:      []
